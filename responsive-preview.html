<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Freaks - Responsive Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .previews {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      flex-wrap: wrap;
    }
    .device {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .device-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #4ade80;
    }
    .device-size {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    .frame {
      border: 3px solid #333;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.15);
    }
    iframe {
      display: block;
      border: none;
    }
  </style>
</head>
<body>
  <h1>📱 Responsive Preview — Health Freaks</h1>
  <p class="subtitle">See how your website looks on different devices. Scroll inside each frame to explore.</p>

  <div class="previews">
    <!-- Mobile -->
    <div class="device">
      <div class="device-label">📱 Mobile</div>
      <div class="device-size">375 × 667 px (iPhone SE)</div>
      <div class="frame" style="width:375px; height:667px;">
        <iframe src="http://localhost:3000" width="375" height="667"></iframe>
      </div>
    </div>

    <!-- Tablet -->
    <div class="device">
      <div class="device-label">📋 Tablet</div>
      <div class="device-size">768 × 1024 px (iPad)</div>
      <div class="frame" style="width:768px; height:700px;">
        <iframe src="http://localhost:3000" width="768" height="1024"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
